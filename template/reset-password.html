<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TMC Agency</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body style="overflow: auto;">
    <div class="auth-wrapper">
        <div class="auth-split">
            <!-- Left Info Section -->
            <div class="auth-info-section">
                <div class="auth-info-content">
                    <h1>Fast, Efficient and Productive</h1>
                    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
                </div>
                <div class="auth-info-footer">
                    <div class="language-selector">
                        <i class="ph ph-globe"></i> English <i class="ph ph-caret-down"></i>
                    </div>
                    <div class="auth-info-links">
                        <a href="#">Terms</a>
                        <a href="#">Plans</a>
                        <a href="#">Contact Us</a>
                    </div>
                </div>
            </div>

            <!-- Right Form Section -->
            <div class="auth-form-section">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2>Set New Password</h2>
                        <p>Your new password must be different from previous used passwords.</p>
                    </div>

                    <form action="login.html">
                        <div class="form-group">
                            <label class="form-label" for="password">New Password</label>
                            <div class="input-with-icon">
                                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                                <i class="ph ph-eye-slash input-icon"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="confirm-password">Confirm New Password</label>
                            <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn-primary btn-full">Reset Password</button>
                    </form>

                    <div class="auth-footer">
                        <p><a href="login.html"><i class="ph ph-arrow-left"></i> Back to Sign In</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
